# Local development orchestration: Postgres + Django backend + nginx frontend.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rbac
      POSTGRES_USER: rbac
      POSTGRES_PASSWORD: rbac
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbac"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SECRET_KEY: dev-secret-change-me
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://rbac:rbac@db:5432/rbac
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
