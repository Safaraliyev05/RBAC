# Argo CD Application — GitOps continuous deployment.
# Argo CD watches the rbac/ Helm chart in this repository and reconciles the
# cluster state to match it automatically on every commit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac-platform
  namespace: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Safaraliyev05/RBAC.git
    targetRevision: master
    path: rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: rbac
  syncPolicy:
    automated:
      prune: true        # remove resources deleted from Git
      selfHeal: true     # revert manual drift back to the Git state
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
