backend:
  enabled: true
  replicaCount: 2
  image:
    repository: safaral1yev05/rbac-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"
      prometheus.io/port: "8000"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 20
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /health/
      port: 8000
      httpHeaders:
        - name: Host
          value: localhost
    initialDelaySeconds: 10
    periodSeconds: 10

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: safaral1yev05/rbac-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    database: rbac
    username: rbac
    password: rbac
  persistence:
    size: 2Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: rbac.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
          port: 8000
        - path: /
          pathType: Prefix
          service: frontend
          port: 80
  tls: []

serviceMonitor:
  enabled: true
  namespace: monitoring
  release: kube-prometheus-stack-1769
  interval: 15s

# Non-secret backend configuration (rendered into a ConfigMap).
config:
  DEBUG: "False"
  ALLOWED_HOSTS: "rbac-backend,localhost,127.0.0.1,.example.com"
  CORS_ALLOWED_ORIGINS: "https://rbac.example.com"
  ACCOUNT_LOCKOUT_ATTEMPTS: "5"
  ACCOUNT_LOCKOUT_DURATION_MINUTES: "30"
  JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
  JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"

# Secret backend configuration (rendered into a Secret).
# NOTE: replace these placeholders via a sealed-secret / external secrets
# manager in production rather than committing real values.
secret:
  SECRET_KEY: "change-me-to-a-long-random-value"
  # DATABASE_URL points at the in-chart postgres service by default.
  DATABASE_URL: "postgres://rbac:rbac@rbac-postgres:5432/rbac"
